<!DOCTYPE html>
<html>
<head>
    <title>Prompt Builder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background-color: #f2f2f2;
        }
        input, textarea, button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
        }
        #result {
            background: white;
            padding: 15px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<h2>Smart Prompt Builder</h2>

<label>What is your goal?</label>
<input type="text" id="goal" placeholder="Example: Write an essay about AI">

<label>Provide context:</label>
<textarea id="context" placeholder="Example: For university level, 500 words"></textarea>

<button onclick="generatePrompt()">Generate Prompt</button>

<div id="result"></div>

<script>
function generatePrompt() {
    var goal = document.getElementById("goal").value;
    var context = document.getElementById("context").value;

    var prompt = "Act as an expert.\n\n" +
                 "Your task is: " + goal + ".\n\n" +
                 "Context: " + context + ".\n\n" +
                 "Provide a detailed and well-structured answer.";

    document.getElementById("result").innerText = prompt;
}
</script>

</body>
</html>
